{{- if .Values.ingress.enabled }}
{{- $fullName := include "moses-chat-bot.fullname" . }}
{{- $svcFrontend := printf "%s-frontend" $fullName }}
{{- $svcBackend := printf "%s-backend" $fullName }}
{{- $portFrontend := .Values.service.frontend.port }}
{{- $portBackend := .Values.service.backend.port }}
{{- $path := .Values.ingress.path | default "/" }}
{{- $pathType := .Values.ingress.pathType | default "Prefix" }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "moses-chat-bot.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # Backend routes — matched first so /api/* and /health do not
          # fall through to the SPA on the frontend.
          - path: {{ printf "%sapi" (trimSuffix "/" $path | default "/") | replace "//" "/" }}
            pathType: Prefix
            backend:
              service:
                name: {{ $svcBackend }}
                port:
                  number: {{ $portBackend }}
          - path: {{ printf "%shealth" (trimSuffix "/" $path | default "/") | replace "//" "/" }}
            pathType: Prefix
            backend:
              service:
                name: {{ $svcBackend }}
                port:
                  number: {{ $portBackend }}
          # Frontend SPA — catch-all under the configured base path.
          - path: {{ $path }}
            pathType: {{ $pathType }}
            backend:
              service:
                name: {{ $svcFrontend }}
                port:
                  number: {{ $portFrontend }}
{{- end }}
