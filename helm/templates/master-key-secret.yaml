{{- /*
master-key-secret.yaml

Auto-generated 32-byte random master encryption key for the chat-bot.
The key bootstraps the AES-GCM envelope that wraps every per-user
Moses API key stored in `chat_relay_links.encrypted_api_key`
(SPEC §6).

CRITICAL: rotating this Secret invalidates every encrypted row. We use
`lookup` to read the existing Secret if it already exists in the
cluster so `helm upgrade` is idempotent. Only on a fresh install
(or after a deliberate `kubectl delete secret ...-master-key`)
do we generate a new 32-byte key.

The Secret value is a JSON document so the crypto envelope can read
it directly with one decode step:

  {"keys": {"v1": "<base64-32-bytes>"}, "active": "v1"}

For ops-driven rotation, edit the Secret out-of-band: add `v2`, flip
`active` → `v2`, then let the background re-encrypt sweeper migrate
ciphertexts.
*/}}
{{- if not .Values.masterKey.existingSecret }}
{{- $secretName := include "moses-chat-bot.masterKeySecretName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $keyJSON := "" }}
{{- if and $existing $existing.data (index $existing.data "master-key.json") }}
{{- /* Reuse the existing Secret payload verbatim — already base64. */}}
{{- $keyJSON = index $existing.data "master-key.json" }}
{{- else }}
{{- /* Generate a fresh 32-byte (256-bit) cryptographically random key.
       Sprig's randBytes returns the base64-encoded form of N random bytes
       sourced from crypto/rand — exactly the shape the envelope wants. We
       previously used `randAlphaNum 32 | b64enc`, which yielded only ~190
       bits of entropy (32 alphanumeric chars limited to [A-Za-z0-9]) before
       base64 expansion. The current form is the canonical 256-bit secret.
       The whole JSON doc is then base64-encoded once more for the Secret
       data field, matching what the crypto envelope decodes on startup. */}}
{{- $b64key := randBytes 32 }}
{{- $doc := printf "{\"keys\":{\"v1\":\"%s\"},\"active\":\"v1\"}" $b64key }}
{{- $keyJSON = $doc | b64enc }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "moses-chat-bot.labels" . | nindent 4 }}
    app.kubernetes.io/component: master-key
  annotations:
    # Helm hook: keep the Secret across releases/uninstalls so a rotated
    # `helm upgrade --install` from clean state does not orphan rows.
    # If the user truly wants to wipe the key, delete the Secret manually.
    "helm.sh/resource-policy": keep
type: Opaque
data:
  master-key.json: {{ $keyJSON | quote }}
{{- end }}
