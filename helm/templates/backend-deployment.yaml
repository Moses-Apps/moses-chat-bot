apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "moses-chat-bot.fullname" . }}-backend
  labels:
    {{- include "moses-chat-bot.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "moses-chat-bot.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "moses-chat-bot.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
        moses.ai/tenant-id: {{ .Values.moses.tenantId | quote }}
        {{- if .Values.moses.chartId }}
        moses.ai/chart-id: {{ .Values.moses.chartId | quote }}
        {{- end }}
        {{- if .Values.moses.appSlug }}
        moses.ai/app-slug: {{ .Values.moses.appSlug | quote }}
        {{- end }}
        moses.ai/managed-by: moses
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.backend.port }}
              protocol: TCP
          {{- if .Values.secrets.secretNames }}
          envFrom:
            {{- include "moses-chat-bot.envFromSecrets" . | nindent 12 }}
          {{- end }}
          env:
            - name: MOSES_BASE_PATH
              value: {{ .Values.moses.basePath | quote }}
            - name: MOSES_APP_SLUG
              value: {{ .Values.moses.appSlug | quote }}
            - name: MOSES_TENANT_ID
              value: {{ .Values.moses.tenantId | quote }}
            - name: MOSES_CHART_ID
              value: {{ .Values.moses.chartId | quote }}
            - name: MOSES_INTERNAL_API_BASE
              # Provisioner overrides this to the in-cluster moses-backend
              # service URL. The default is intentionally empty so a
              # mis-configured deploy fails loudly rather than calling
              # the wrong target.
              value: {{ default "" (index .Values.env.backend "MOSES_INTERNAL_API_BASE") | quote }}
            {{- if .Values.postgres.enabled }}
            - name: DATABASE_HOST
              value: {{ include "moses-chat-bot.postgresFullname" . | quote }}
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_USER
              value: {{ .Values.postgres.auth.username | quote }}
            - name: DATABASE_NAME
              value: {{ .Values.postgres.auth.database | quote }}
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "moses-chat-bot.postgresSecretName" . }}
                  key: postgresql-password
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgres.auth.username }}:$(DATABASE_PASSWORD)@{{ include "moses-chat-bot.postgresFullname" . }}:5432/{{ .Values.postgres.auth.database }}?sslmode=disable"
            {{- end }}
            # Telegram tokens are expected to arrive via secrets.secretNames
            # (envFrom). The explicit valueFrom entries below are a fallback
            # for setups that mount a dedicated telegram secret; the platform
            # picker can choose either path.
            {{- if not .Values.secrets.secretNames }}
            - name: TELEGRAM_BOT_TOKEN
              value: ""
            - name: TELEGRAM_WEBHOOK_SECRET
              value: ""
            {{- end }}
            - name: CHAT_BOT_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "moses-chat-bot.masterKeySecretName" . }}
                  key: master-key.json
            {{- range $key, $value := .Values.env.backend }}
            {{- if ne $key "MOSES_INTERNAL_API_BASE" }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources.backend | nindent 12 }}
