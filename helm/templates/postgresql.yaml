{{- if .Values.postgres.enabled }}
{{- if not .Values.postgres.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "moses-chat-bot.postgresSecretName" . }}
  labels:
    {{- include "moses-chat-bot.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
type: Opaque
data:
  postgresql-password: {{ .Values.postgres.auth.password | b64enc | quote }}
---
{{- end }}
# Standalone PVC — NOT a StatefulSet volumeClaimTemplate. A StatefulSet's
# spec is immutable on most fields, so Helm `upgrade` (every Moses re-deploy)
# fails with "Forbidden: updates to statefulset spec ... are forbidden". A
# Deployment + standalone PVC is fully upgradeable.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "moses-chat-bot.postgresFullname" . }}-data
  labels:
    {{- include "moses-chat-bot.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.postgres.storage.storageClassName }}
  storageClassName: {{ .Values.postgres.storage.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.postgres.storage.size | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "moses-chat-bot.postgresFullname" . }}
  labels:
    {{- include "moses-chat-bot.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  # Recreate, not RollingUpdate: the data PVC is ReadWriteOnce, so the old
  # pod must release it before the new pod can mount it.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "moses-chat-bot.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "moses-chat-bot.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "moses-chat-bot.postgresSecretName" . }}
                  key: postgresql-password
            - name: POSTGRES_DB
              value: {{ .Values.postgres.auth.database | quote }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.auth.username | quote }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.auth.username | quote }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "moses-chat-bot.postgresFullname" . }}-data
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "moses-chat-bot.postgresFullname" . }}
  labels:
    {{- include "moses-chat-bot.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    {{- include "moses-chat-bot.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
{{- end }}
