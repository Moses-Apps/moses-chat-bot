# pre-commit hooks for moses-chat-bot.
# Install with: pip install pre-commit && pre-commit install
# Run all once:  pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # Helm templates are not valid YAML on their own — let helm lint catch them.
        exclude: ^helm/templates/
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=512]

  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        entry: bash -c 'cd backend && out=$(gofmt -l .) && if [ -n "$out" ]; then echo "gofmt needs to format:"; echo "$out"; exit 1; fi'
        language: system
        files: ^backend/.*\.go$
        pass_filenames: false

      - id: prettier
        name: prettier (frontend)
        entry: bash -c 'cd frontend && npx --yes prettier --check "src/**/*.{ts,tsx}"'
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false

      - id: eslint
        name: eslint (frontend)
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false
